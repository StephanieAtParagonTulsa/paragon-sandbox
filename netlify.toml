[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/blobs"
  to   = "/.netlify/functions/blobs"
  status = 200
  force  = true

[[redirects]]
  from = "/api/store-report"
  to   = "/.netlify/functions/store-reports"
  status = 200
  force  = true

[[redirects]]
  from = "/api/get-report"
  to   = "/.netlify/functions/store-reports"
  status = 200
  force  = true

[[redirects]]
  from = "/api/list-reports"
  to   = "/.netlify/functions/store-reports"
  status = 200
  force  = true

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin  = "*"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type"
